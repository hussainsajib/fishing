            detail: "The Humber River mouth at Humber Bay Park East is one of the most accessible carp venues in Ontario. Carp stack up along the rip-rap shoreline, around marina breakwalls, and in the weedy shallows off the spit. Tommy Thompson Park (Leslie Street Spit) adds miles of quiet lagoon-edge fishing with almost no pressure. Fish margins at dawn with sweetcorn or boilies.",
            map: "https://www.google.com/maps/search/?api=1&query=Humber+Bay+Park+East+Toronto+Ontario",
            imgs: ["toronto waterfront lake ontario fishing","humber bay park shoreline lake","breakwall riprap fishing lake ontario"] },
          { title: "Don River & Ashbridges Bay (Toronto — 0–20 min)",
            detail: "The lower Don River and its outlet at Ashbridges Bay is a productive urban carp fishery. Carp exceeding 2 feet are regularly caught from the river banks in Don Valley Park, particularly around the bends near Pottery Road and the Corktown Common area. The bay margins hold fish in the weed throughout summer. The Don Valley trail gives easy bank access along the whole stretch.",
            map: "https://www.google.com/maps/search/?api=1&query=Corktown+Common+Don+River+Toronto+Ontario",
            imgs: ["don river toronto fishing urban","river bend urban fishing city","ashbridges bay toronto lake fishing"] },
          { title: "Credit River – Streetsville to Port Credit (Mississauga — 30 min)",
            detail: "The lower Credit River holds a dense carp population year-round. Target the slower bends and deeper pools between Streetsville and the lake outlet at Port Credit. Bread paste and corn are deadly here. After heavy rain, carp push into shallower runs — wade quietly and sight-fish. Parking at Erindale Park or Riverside Park in Streetsville.",
            map: "https://www.google.com/maps/search/?api=1&query=Erindale+Park+Credit+River+Mississauga+Ontario",
            imgs: ["credit river mississauga fishing","river bend deep pool fishing","river carp fishing shallow run"] },
          { title: "Holland River – East Gwillimbury & Cook's Bay (45 min north)",
            detail: "The Holland River flowing through East Gwillimbury into the southern end of Lake Simcoe holds some of the biggest carp in the province. The slow, silty river channel and the shallow Cook's Bay area warm early in spring. Access the river from the Holland River Marina or fish the lake margins along Georgina Island Road. Chumming with corn the evening before is highly recommended here.",
            map: "https://www.google.com/maps/search/?api=1&query=Holland+River+East+Gwillimbury+Ontario",
            imgs: ["holland river ontario fishing","cook bay lake simcoe shallow fishing","slow silty river fishing ontario"] },
          { title: "Speed River – Guelph (1 hr west)",
            detail: "The Speed River running through Guelph holds a healthy carp population in its deeper pools and under road bridges. Access from Riverside Park or the Hanlon Creek trail. The stretch near Stone Road and downstream toward Cambridge — where the Speed meets the Grand — is particularly productive. Fish the slack water behind bridge pillars with boilies or corn.",
            map: "https://www.google.com/maps/search/?api=1&query=Riverside+Park+Speed+River+Guelph+Ontario",
            imgs: ["speed river guelph ontario fishing","river bridge pool deep fishing","guelph ontario river park nature"] },
          { title: "Hamilton Harbour & Cootes Paradise (1 hr)",
            detail: "Hamilton Harbour offers easy shore fishing from the Bayfront Park seawall, with carp cruising warm shallow margins throughout summer. Cootes Paradise marsh (west end) is exceptional in spring — shallow dark-bottomed bays warm early and hold large carp that are often visible. Access via RBG Cootes Drive or the Desjardins Canal trail. Quiet approach is essential in the clear marsh water.",
            map: "https://www.google.com/maps/search/?api=1&query=Bayfront+Park+Hamilton+Harbour+Ontario",
            imgs: ["hamilton harbour waterfront fishing ontario","marsh bay shallow warm water fishing","cootes paradise nature ontario water"] },
          { title: "Niagara River – Fort Erie & Queenston (1.5 hrs)",
            detail: "The Niagara River holds large carp in the slack water eddies behind bridge pillars and in the calmer sections downstream of Fort Erie. Mather Arch Park and the Peace Bridge area in Fort Erie are the best access points. Use heavier 2.5–4oz leads to hold bottom in the current. The calmer upper river above the Falls near Queenston is easier for beginners.",
            map: "https://www.google.com/maps/search/?api=1&query=Mather+Arch+Park+Fort+Erie+Niagara+River+Ontario",
            imgs: ["niagara river fort erie fishing","river bank strong current fishing","niagara river ontario bank fishing"] },
          { title: "Welland Recreational Canal (1.5 hrs southwest)",
            detail: "The Welland Recreational Canal runs parallel to the main ship canal and offers calm, deep water with consistent carp throughout. Multiple access points in Welland and Port Colborne make it easy. Steady depth, minimal current, and weedy margins make it a forgiving venue. Pre-baiting a swim with corn, hemp, and pellets works well. A Niagara Peninsula Conservation Authority permit is required.",
            map: "https://www.google.com/maps/search/?api=1&query=Welland+Recreational+Canal+Welland+Ontario",
            imgs: ["welland canal ontario fishing calm water","straight canal bank fishing deep","canal fishing rod setup bank sticks"] },
          { title: "Grand River – Paris & Brantford (1.5 hrs)",
            detail: "The Grand River is arguably Ontario's most productive carp river. The stretch between Paris and Brantford has deep gravel runs, weir pools, and miles of marginal slack water. The Brantford Lions Park weir pool is a known hotspot — large commons and mirrors to 20+ lbs are common. Use a swimfeeder or spod mix on the gravel runs. Parking at Conservation Authority access points throughout.",
            map: "https://www.google.com/maps/search/?api=1&query=Lions+Park+Grand+River+Brantford+Ontario",
            imgs: ["grand river brantford fishing ontario","weir pool river carp fishing","river gravel run fishing ontario"] },
          { title: "Earl Rowe Provincial Park – Boyne River & Earl Rowe Lake (1.5 hrs north)",
            detail: "Ontario Parks officially lists carp among the species in the Boyne River watershed that runs through Earl Rowe Provincial Park near Angus. Anglers report 'loads of small carp spawning in the lake' during spring. The park's lake and the Boyne River below the dam both hold fish alongside pike, trout, and bass. Day-use fishing is permitted with a valid Ontario licence — a peaceful, uncrowded spot that most carp anglers overlook entirely.",
            map: "https://www.google.com/maps/search/?api=1&query=Earl+Rowe+Provincial+Park+Angus+Ontario",
            imgs: ["provincial park lake fishing calm","boyne river ontario fishing bank","small lake dam fishing ontario park"] },
          { title: "Lake Scugog – Port Perry (1.5–2 hrs northeast)",
            detail: "Lake Scugog is one of Ontario's best-documented carp fisheries. The carp population — which originated from a fish farm dike collapse — has thrived in the shallow, silty, vegetation-rich basin and fish regularly grow to 3ft into the mid- to high-20 lb range. Fish'n Canada filmed a dedicated carp episode here. Named spots around the lake:<br><br>• <strong>Sunset Haven</strong> (east shore, near Blue Heron Casino) — the best-known carp swim: a large clean-bottomed flat fished from bank or boat. Lawrence Bendandi rents accommodation here specifically for carp anglers — pre-bait the flat with corn and hemp the evening before (sunsethaven.ca).<br>• <strong>Caesarea public dock</strong> (east shore) — one of the best free bank-access points; gravel-to-silt bottom transition nearby holds fish.<br>• <strong>Hwy 7A Causeways</strong> — both the Port Perry Causeway and Cartwright Causeway cross the lake and are fishable from the roadside; the Port Perry Causeway borders the Osler Marsh on the north side.<br>• <strong>Palmer Park &amp; Waterfront Trail</strong> (Port Perry town centre) — public shore access from Casmir St, Mary St, and Queen St ends; quieter option right in town.<br>• <strong>Nonquon River mouth</strong> (near Seagrave, northwest shore) — the lake's main inflow; warm silty shallows and a classic spring carp staging area.<br>• <strong>Western shoreline north of Port Perry</strong> — large floating weed mats pushed by wind in summer; prime holding water, mainly boat access.",
            map: "https://www.google.com/maps/search/?api=1&query=Lake+Scugog+Port+Perry+Ontario",
            imgs: ["lake scugog ontario fishing boat","shallow weedy lake ontario fishing","port perry ontario lake water"] },
          { title: "Del Crary Park – Little Lake, Peterborough (2 hrs northeast)",
            detail: "Fish'n Canada and Outdoor Canada both call Peterborough a genuine <strong>carp Mecca</strong> — European anglers make the trip specifically for this water. Little Lake is shallow (6–10 ft), warm, and described as 'virtually laden with carp.' Outdoor Canada documented <strong>20 lb+ fish caught every 30–45 minutes</strong> on an August session — and the guides said it was a below-average day. Del Crary Park on the west/south shore is the best-known swim: flat paved bank next to the marina and Otonabee River inflow. The T-wharf stretch on Crescent St (near the old Holiday Inn) is a named hotspot. Use a hair rig with boilies or yellow corn — <strong>yellow bait is specifically recommended</strong> for this water. Pre-bait with groundbait before your session. Local guide <strong>Will Muschett (Peterborough Carping Guides)</strong> runs dedicated day sessions here.",
            map: "https://www.google.com/maps/search/?api=1&query=Del+Crary+Park+Peterborough+Ontario",
            imgs: ["del crary park peterborough waterfront","little lake peterborough ontario fishing","hair rig boilies carp fishing setup"] },
          { title: "Rogers Cove – Little Lake, Peterborough (2 hrs northeast)",
            detail: "Rogers Cove Park (131 Maria St) sits on the <strong>north shore of Little Lake</strong>, directly across from the Del Crary marina. Same carp-dense water, but noticeably quieter. The supervised swimming beach gives a gently shelving, shallow shoreline — exactly the kind of margin carp move into at dawn and dusk to feed. The Trans-Canada Trail runs the full length of the north bank, making this an ideal venue for a mobile stalking session — walk the shore, spot fish, then present a bait. Mark Street Boat Launch is immediately adjacent if you want to combine boat and bank fishing. Large free car park on site.",
            map: "https://www.google.com/maps/search/?api=1&query=Rogers+Cove+Park+Peterborough+Ontario",
            imgs: ["rogers cove peterborough lake ontario","shallow lake beach shore fishing","north shore lake carp stalking fishing"] },
          { title: "Lock 20 – Ashburnham, Peterborough (2 hrs northeast)",
            detail: "Lock 20 (175 Maria St) sits at the <strong>northeast corner of Little Lake</strong> where it connects to the Trent-Severn canal. A Parks Canada facility with picnic tables, a Trans-Canada Trail connection, and a quiet atmosphere well away from marina traffic. The lock pool and the still, channelled canal cut are directly connected to carp-loaded Little Lake — no specific catch reports are published here, but the deep, sheltered lock pool is textbook carp holding water. Shore fishing is permitted with a valid Ontario licence. The same hair rig and boilie tactics used at Del Crary apply; the calmer water means a lighter lead is fine.",
            map: "https://www.google.com/maps/search/?api=1&query=Lock+20+Ashburnham+Trent+Severn+Peterborough+Ontario",
            imgs: ["trent severn lock canal fishing ontario","lock pool canal fishing quiet","peterborough lock waterway fishing"] },
          { title: "McNamara Park – Otonabee River, Peterborough (2 hrs northeast)",
            detail: "McNamara Park (McNamara Dr, south Peterborough) sits on the <strong>Otonabee River</strong> — not Little Lake — so different tactics are needed. The Otonabee through Peterborough is one of expert Len Perdic's top-rated carp stretches in the entire Trent-Severn Waterway, with Fish'n Canada documenting 'bite alarms screaming throughout the day' at a city-centre session nearby. Fish the shallow margins at dawn and dusk; mid-day fish retreat to deeper holes — target those with a longer cast. Use a <strong>flat 1oz+ lead</strong> to hold bottom in the gentle current rather than an inline ball lead. The park was co-developed with OFAH specifically as a fishing-access and conservation-education site, so bank access and signage are good.",
            map: "https://www.google.com/maps/search/?api=1&query=McNamara+Park+Peterborough+Ontario",
            imgs: ["otonabee river peterborough fishing bank","river carp fishing flat lead current","peterborough riverside park fishing ontario"] },
          { title: "Jackson Creek – Peterborough: Verdict (2 hrs northeast)",
            detail: "<strong>Not recommended as a dedicated carp target.</strong> Jackson Creek flows through Peterborough and enters Little Lake at Del Crary Park, but the evidence is clear: FishBrain logs 7 catches from the creek (rock bass, creek chub, smallmouth, muskie — no carp). FishAngler lists creek chub, sculpin, and white sucker as the dominant species. No Ontario fishing forum, Fish'n Canada article, or iNaturalist record documents a carp caught in the creek. The reason is physical — the creek is <strong>small and shallow</strong> (riffles and modest pools averaging under 1 m), <strong>mostly culverted underground</strong> through downtown Peterborough, and had a hydrocarbon spill in the lower urban section in 2022. In dry summers the upper section can nearly dry out entirely. The only section with any open bank access is the <strong>Jackson Creek Kiwanis Trail</strong> (Jackson Park to Ackison Rd, 4.5 km) — worth walking for smallmouth and bass, but not carp. The one exception: at spring high water, carp from Little Lake could theoretically push a short distance into the creek mouth at Del Crary Park — but you would effectively just be fishing the edge of Little Lake. Fish the lake instead.",
            map: "https://www.google.com/maps/search/?api=1&query=Jackson+Creek+Kiwanis+Trail+Peterborough+Ontario",
            imgs: ["small creek urban peterborough fishing","jackson creek peterborough trail nature","creek smallmouth bass fishing shallow"] },
          { title: "Bay of Quinte – Belleville & Deseronto (2.5 hrs east)",
            detail: "The Bay of Quinte is a long sheltered bay off Lake Ontario ranking among the top carp waters in the province. The narrows between Belleville and Deseronto concentrate fish — target weed beds and soft silty margins on either side. Access from Zwicks Centennial Park in Belleville or along Hwy 49 near Deseronto. Consistent doubles and a genuine chance at 20+ lb fish.",
            map: "https://www.google.com/maps/search/?api=1&query=Zwicks+Centennial+Park+Belleville+Ontario",
            imgs: ["bay of quinte ontario fishing","belleville ontario waterfront lake","sheltered bay fishing lake ontario weed"] },
          { title: "Rice Lake – Bewdley & Harwood (2 hrs northeast)",
            detail: "Rice Lake north of Cobourg is renowned for large common carp in the 15–25 lb range. The weedy north shore around Harwood and the reed-lined bays near Bewdley are prime spots. Boat access opens up the best areas, but shore fishing from public launches is productive. Pre-bait with hemp and corn the evening before for best results.",
            map: "https://www.google.com/maps/search/?api=1&query=Bewdley+Rice+Lake+Ontario",
            imgs: ["rice lake ontario fishing boat","reeds lake shallow fishing ontario","large carp held fisherman lake"] },
          { title: "St. Lawrence River – Prescott, Brockville & Kingston (3–4 hrs east)",
            detail: "The St. Lawrence offers world-class carp fishing in its slow back channels, harbour edges, and around the Thousand Islands. Prescott Harbour and the Brockville waterfront are easy access points. Kingston's harbours and the Cataraqui River mouth are outstanding — sheltered, weedy, and lightly pressured. The combination of slow current, rich food supply, and warm summer shallows makes this a destination venue.",
            map: "https://www.google.com/maps/search/?api=1&query=Prescott+Harbour+Waterfront+Ontario",
            imgs: ["st lawrence river ontario fishing","kingston harbour ontario waterfront","thousand islands ontario summer river"] },
          { title: "Ottawa River – Britannia Park & Rideau River (4.5–5 hrs east)",
            detail: "The Ottawa River holds a large and largely unfished carp population in its slow back bays. Britannia Park on the Ottawa city side offers excellent shore access along wide calm margins. The Rideau River running through Ottawa is also productive, particularly below the Hogs Back Falls weir where carp congregate. Ontario Fishing Adventures runs guided carp trips here if you want to learn the water fast.",
            map: "https://www.google.com/maps/search/?api=1&query=Britannia+Park+Ottawa+River+Ontario",
            imgs: ["ottawa river ontario fishing bank","rideau river ottawa carp fishing","britannia park ottawa waterfront nature"] },
          { title: "Lake St. Clair – Windsor & Tecumseh (4–4.5 hrs southwest)",
            detail: "Lake St. Clair is widely considered Ontario's number-one carp destination. The water is shallow, warm, and incredibly fertile — fish averaging 18–25 lbs with genuine 30+ lb fish every season. Target the weed flats and channel margins along Lakeshore Road between Tecumseh and Belle River. Boat fishing is most effective, but Lakeview Park Marina and Sandpoint Beach produce well from shore. Boilies and tiger nuts outperform corn here.",
            map: "https://www.google.com/maps/search/?api=1&query=Lakeview+Park+Marina+Windsor+Ontario",
            imgs: ["lake st clair ontario windsor fishing","shallow weed flat fishing boat ontario","large trophy carp fishing ontario lake"] },
        ]
      },
      {
        id: "technique", icon: "⚙️", label: "Casting & Technique", color: "#1a6b8a",
        intro: "Execution separates a good setup from a caught fish. Carp reward precision, patience, and attention to small details.",
        videos: [
          { id: "gZzKO0SHifo", label: "How to Cast a Carp Rod & Hit the Line Clip" },
          { id: "jQgVrdCJPgs", label: "Cast with 100% Accuracy – Line Clip & Distance Sticks" },
        ],
        tips: [
          { title: "Accuracy beats distance",
            detail: "Cast to a specific spot — a lily pad edge, a gap in reeds, a visible feature — and hit it every time. Use a marker float to find depth and features first. Clip your line on the reel spool once you find the right distance, so every cast hits the same spot.",
            imgs: ["fishing cast overhead rod arc","line clip reel fishing spool","marker float fishing lake depth"] },
          { title: "Slack line after casting",
            detail: "After casting, point your rod tip at the water and let out 30cm of slack. On a baitrunner, engage the freespool. This ensures the line lies flat — a taut line can pull your rig out of position and creates resistance that spooks cautious carp.",
            imgs: ["fishing rod tip pointing water low","slack fishing line on water","rod positioned low water fishing"] },
          { title: "Stealth at the bank",
            detail: "Move slowly and quietly. Footsteps transmit through the ground into the water — carp feel low-frequency vibrations. Don't bang tackle boxes, talk loudly, or cast carelessly. In clear or pressured water, stay back from the bank edge and crouch when you can.",
            imgs: ["angler crouching low bank fishing","quiet approach fishing bank still","fisherman hidden bank low profile"] },
          { title: "Playing a carp",
            detail: "When a run starts: disengage the baitrunner (turn the handle), lift the rod firmly to set the hook, then keep steady pressure — not a yank. Let the fish run when it wants to; use the drag to tire it. Steer it away from snags by lowering the rod sideways toward open water.",
            imgs: ["angler fighting large fish rod bent","fishing rod bent strain big fish","carp angler playing fish reel"] },
          { title: "Waiting and rebaiting",
            detail: "Recast every 45–90 minutes if nothing happens — your bait may have been cleaned off by small fish, or the scent trail has dispersed. Before recasting, introduce another small handful of loose feed.",
            imgs: ["fisherman waiting lake chair relaxed","angler sitting patient bank rods","casting bait hand throwing feed lake"] },
          { title: "Catch & release care",
            detail: "Wet your hands before handling carp. Use a large unhooking mat — never put them on bare ground. Remove hooks with forceps or a disgorger. Support the fish horizontally for photos; never hold by the lip. Return head-first, holding upright in the water until it kicks away.",
            imgs: ["large carp held horizontal safely","unhooking mat fish care fishing","releasing fish back water gently"] },
        ]
      }
    ];

    const seasons = [
      { season: "🌸 Spring (May–Jun)", rating: 5, note: "Best season — aggressive feeding" },
      { season: "☀️ Summer (Jul–Aug)", rating: 3, note: "Early morning & night only" },
      { season: "🍂 Autumn (Sep–Oct)", rating: 4, note: "Excellent pre-winter feeding" },
      { season: "❄️ Winter (Nov–Apr)", rating: 1, note: "Very slow, warm spells only" },
    ];
    const baitTemps = [
      { temp: "Below 10°C", baits: "Fishmeal, cheese, shrimp", bg: "#e8f0f8" },
      { temp: "10–16°C",    baits: "Corn, boilies, worm",    bg: "#e8f5e8" },
      { temp: "16–24°C",    baits: "All baits, fruity flavours", bg: "#f5f5e0" },
      { temp: "Above 24°C", baits: "Surface bread, floaters", bg: "#fdf0e8" },
    ];
    const checklist = ["12ft carp rod","Baitrunner reel (4000–6000)","15lb mono line","Fluorocarbon leader (20lb)","Bank sticks x2","Bite alarms / bell","42\" landing net","Unhooking mat","Hook size 6 & 8","1.5–3oz leads","Hair rig components","Baiting needle","Forceps/disgorger"];

    let imgSeed = 100;

    function unsplashUrl(keyword) {
      const seed = imgSeed++;
      return `https://source.unsplash.com/featured/400x300/?${encodeURIComponent(keyword)}&sig=${seed}`;
    }

    function renderExtra(s) {
      if (s.extra === "seasons") {
        return `<div class="extra-panel"><h4>Ontario Season Rating</h4>
          ${seasons.map(r => `
            <div class="season-row">
              <div class="season-name">${r.season}</div>
              <div class="rating-bars">${[1,2,3,4,5].map(n=>`<div class="bar ${n<=r.rating?"on":"off"}"></div>`).join("")}</div>
              <div class="season-note">${r.note}</div>
            </div>`).join("")}
        </div>`;
      }
      if (s.extra === "baittemp") {
        return `<div class="extra-panel"><h4>Quick Bait Temperature Guide</h4>
          <div class="temp-grid">
            ${baitTemps.map(r=>`<div class="temp-card" style="background:${r.bg}"><div class="temp-label">${r.temp}</div><div class="temp-baits">${r.baits}</div></div>`).join("")}
          </div></div>`;
      }
      if (s.extra === "checklist") {
        return `<div class="extra-panel"><h4>Starter Kit Checklist</h4>
          <div class="checklist">${checklist.map(item=>`<div class="check-pill">✓ ${item}</div>`).join("")}</div>
        </div>`;
      }
      return "";
    }

    function buildContent() {
      const content = document.getElementById("content");
      content.innerHTML = sections.map((s, si) => {
        const tipsHTML = s.tips.map((tip, i) => {
          const imgsHTML = (tip.imgs || []).map(kw =>
            `<img class="tip-img" src="${unsplashUrl(kw)}" alt="${kw}" loading="lazy" onerror="this.style.display='none'">`
          ).join("");
          return `
            <div class="tip-card" style="border-left-color:${s.color}; border-color:${s.color}40">
              <div class="tip-body">
                <div class="tip-num" style="color:${s.color}">${String(i+1).padStart(2,"0")}</div>
                <h3 class="tip-title">${tip.title}</h3>
                <p class="tip-detail">${tip.detail}</p>
                ${tip.map ? `<a class="tip-map-link" href="${tip.map}" target="_blank" rel="noopener">📍 View on Google Maps</a>` : ''}
              </div>
              ${imgsHTML ? `<div class="tip-images">${imgsHTML}</div>` : ""}
            </div>`;
        }).join("");

        const videosHTML = s.videos && s.videos.length ? `
          <div class="video-section">
            <div class="video-section-header">▶ &nbsp;Related Video Tutorials — click to watch on YouTube</div>
            <div class="video-grid">
              ${s.videos.map(v => `
                <a class="video-thumb" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
                  <div class="video-label">Tutorial</div>
                  <div class="video-img-wrap">
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.label}" loading="lazy">
                    <div class="play-btn">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
                    </div>
                  </div>
                  <div class="video-title-bar"><span class="yt-badge">YT</span>${v.label}</div>
                </a>`).join("")}
            </div>
          </div>` : "";

        return `
          <section class="fish-section" id="${s.id}">
            <div class="section-header">
              <div class="section-icon" style="background:${s.color}; box-shadow:0 4px 20px ${s.color}55">${s.icon}</div>
              <div>
                <div class="section-title">${s.label}</div>
                <div class="section-intro">${s.intro}</div>
              </div>
            </div>
            <div class="divider" style="background:linear-gradient(90deg,${s.color}88,transparent)"></div>
            <div class="tips">${tipsHTML}</div>
            ${videosHTML}
            ${renderExtra(s)}
          </section>
          ${si < sections.length - 1 ? '<div class="section-break"></div>' : ''}`;
      }).join("");
    }

    function buildNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = sections.map(s =>
        `<a class="nav-btn" href="#${s.id}" data-id="${s.id}">${s.icon} ${s.label}</a>`
      ).join("");

      // Highlight nav link for whichever section is most visible
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".nav-btn").forEach(b => {
              b.classList.remove("active");
              b.style.background = "";
            });
            const btn = nav.querySelector(`[data-id="${entry.target.id}"]`);
            if (btn) {
              btn.classList.add("active");
              const sec = sections.find(x => x.id === entry.target.id);
              if (sec) btn.style.background = sec.color;
              btn.scrollIntoView({ block: "nearest", inline: "center" });
            }
          }
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      document.querySelectorAll(".fish-section").forEach(el => observer.observe(el));
    }

    buildContent();
    buildNav();
  </script>
</body>
</html>
