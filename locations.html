            detail: "Lake Scugog is one of Ontario's best-documented carp fisheries — the population originated from a fish farm dike collapse and has thrived in the shallow, silty, vegetation-rich basin. Fish regularly grow to 3ft and into the mid- to high-20 lb range. Fish'n Canada filmed a dedicated carp episode here. Key spots: <strong>Sunset Haven</strong> (east shore, near Blue Heron Casino — carp-specific accommodation run by Lawrence Bendandi; pre-bait the clean-bottomed flat); <strong>Caesarea public dock</strong> (east shore, free access); <strong>Hwy 7A causeways</strong> (roadside fishing); <strong>Nonquon River mouth</strong> (northwest, near Seagrave — warm silty inflow, spring staging); <strong>Palmer Park waterfront trail</strong> (Port Perry town centre, Casmir/Mary/Queen St access).",
            species: [
              { name: "Carp", status: "peak" },
              { name: "Largemouth Bass", status: "open" },
              { name: "Walleye", status: "open" },
              { name: "Muskellunge", status: "open" },
              { name: "Yellow Perch", status: "open" },
            ],
            map: "https://www.google.com/maps/search/?api=1&query=Lake+Scugog+Port+Perry+Ontario",
            imgs: ["lake scugog ontario fishing boat","shallow weedy lake ontario fishing","port perry ontario lake scugog"],
          },
        ],
      },
      {
        id: "eastern",
        icon: "⛵",
        label: "Eastern Ontario",
        color: "#8b2222",
        intro: "Eastern Ontario's rivers and the St. Lawrence offer some of the most lightly pressured fishing in the province — world-class carp in sheltered back channels, outstanding walleye, and trophy pike.",
        tips: [
          {
            title: "St. Lawrence River – Prescott, Brockville & Kingston",
            drive: "3–4 hrs E of Toronto",
            access: "Prescott Harbour waterfront; Brockville waterfront park; Kingston Confederation Basin",
            season: "Carp May–October; walleye year-round; bass open 4th Saturday in June; muskie open June",
            detail: "The St. Lawrence offers world-class fishing in its slow back channels, harbour edges, and around the Thousand Islands. Prescott Harbour and the Brockville waterfront are easy access points with consistent carp in the 15–25 lb range — sheltered, weedy, and lightly pressured. Kingston's harbours and the Cataraqui River mouth are outstanding for multiple species. The Thousand Islands section holds trophy muskellunge and largemouth bass. Walleye are present year-round in the main channel. This is a destination venue worth the drive for a weekend trip.",
            species: [
              { name: "Carp", status: "open" },
              { name: "Walleye", status: "open" },
              { name: "Muskellunge", status: "open" },
              { name: "Largemouth Bass", status: "open" },
              { name: "Northern Pike", status: "open" },
            ],
            map: "https://www.google.com/maps/search/?api=1&query=Prescott+Harbour+Waterfront+Ontario",

          {
            title: "Ottawa River – Britannia Park, Ottawa",
            drive: "4.5–5 hrs E of Toronto",
            access: "Britannia Park (Ottawa); Petrie Island boat launch; Rideau River — multiple city parks",
            season: "Carp May–October; walleye and pike year-round; bass open 4th Saturday in June",
            detail: "The Ottawa River holds a large and largely unfished carp population in its slow back bays and wide calm margins. Britannia Park on the city side offers excellent shore access. The Rideau River running through Ottawa is also productive, particularly below the Hogs Back Falls weir where carp and bass congregate. The Ottawa River itself holds walleye, pike, and muskie in addition to carp — it is a genuine multi-species destination. Ontario Fishing Adventures and local guides run carp-specific trips on the Ottawa. Petrie Island near Orléans has a good boat launch and access to the flats.",
            species: [
              { name: "Carp", status: "open" },
              { name: "Walleye", status: "open" },
              { name: "Northern Pike", status: "open" },
              { name: "Muskellunge", status: "open" },
              { name: "Largemouth Bass", status: "open" },
            ],
            map: "https://www.google.com/maps/search/?api=1&query=Britannia+Park+Ottawa+River+Ontario",
            imgs: ["ottawa river ontario fishing bank","britannia park ottawa waterfront","rideau river ottawa carp fishing"],
          },
        ],

    ];

    let imgSeed = 100;
    function unsplashUrl(kw) {
      return `https://source.unsplash.com/featured/400x300/?${encodeURIComponent(kw)}&sig=${imgSeed++}`;
    }

    function buildContent() {
      const content = document.getElementById("content");
      content.innerHTML = sections.map((s, si) => {
        const tipsHTML = s.tips.map((tip, i) => {
          const imgsHTML = (tip.imgs || []).map(kw =>
            `<img class="tip-img" src="${unsplashUrl(kw)}" alt="${kw}" loading="lazy" onerror="this.style.display='none'">`
          ).join("");

          const tagsHTML = (tip.species || []).map(sp =>
            `<span class="species-tag ${sp.status === 'peak' ? 'peak' : ''}">${sp.status === 'peak' ? '★ ' : ''}${sp.name}</span>`
          ).join("");

          const metaHTML = `
            <div class="loc-meta">
              <div class="loc-meta-item"><span class="loc-meta-label">Drive</span> ${tip.drive}</div>
              <div class="loc-meta-item"><span class="loc-meta-label">Access</span> ${tip.access}</div>
              <div class="loc-meta-item"><span class="loc-meta-label">Peak season</span> ${tip.season}</div>
            </div>`;

          return `
            <div class="tip-card" style="border-left-color:${s.color}; border-color:${s.color}40">
              <div class="tip-body">
                <div class="tip-num" style="color:${s.color}">${String(i+1).padStart(2,"0")}</div>
                <h3 class="tip-title">${tip.title}</h3>
                <p class="tip-detail">${tip.detail}</p>
                <div class="species-tags">${tagsHTML}</div>
                ${metaHTML}
                ${tip.map ? `<a class="tip-map-link" href="${tip.map}" target="_blank" rel="noopener">📍 View on Google Maps</a>` : ''}
              </div>
              ${imgsHTML ? `<div class="tip-images">${imgsHTML}</div>` : ""}
            </div>`;
        }).join("");

        return `
          <section class="fish-section" id="${s.id}">
            <div class="section-header">
              <div class="section-icon" style="background:${s.color}; box-shadow:0 4px 20px ${s.color}55">${s.icon}</div>
              <div>
                <div class="section-title">${s.label}</div>
                <div class="section-intro">${s.intro}</div>
              </div>
            </div>
            <div class="divider" style="background:linear-gradient(90deg,${s.color}88,transparent)"></div>
            <div class="tips">${tipsHTML}</div>
          </section>
          ${si < sections.length - 1 ? '<div class="section-break"></div>' : ''}`;
      }).join("");
    }

    function buildNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = sections.map(s =>
        `<a class="nav-btn" href="#${s.id}" data-id="${s.id}">${s.icon} ${s.label}</a>`
      ).join("");

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".nav-btn").forEach(b => {
              b.classList.remove("active");
              b.style.background = "";
            });
            const btn = nav.querySelector(`[data-id="${entry.target.id}"]`);
            if (btn) {
              btn.classList.add("active");
              const sec = sections.find(x => x.id === entry.target.id);
              if (sec) btn.style.background = sec.color;
              btn.scrollIntoView({ block: "nearest", inline: "center" });
            }
          }
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      document.querySelectorAll(".fish-section").forEach(el => observer.observe(el));
    }

    buildContent();
    buildNav();
  </script>
</body>
