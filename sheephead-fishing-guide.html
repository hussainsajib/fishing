      {
        id: "locations", icon: "📍", label: "Ontario Locations", color: "#5a7a8a",

            map: "https://www.google.com/maps/search/?api=1&query=Mather+Arch+Park+Fort+Erie+Ontario",

            map: "https://www.google.com/maps/search/?api=1&query=Dunnville+Grand+River+Ontario",

            map: "https://www.google.com/maps/search/?api=1&query=Port+Dover+Lake+Erie+Ontario+fishing",

            map: "https://www.google.com/maps/search/?api=1&query=LaSalle+Waterfront+Park+Ontario+Detroit+River",

            map: "https://www.google.com/maps/search/?api=1&query=Tecumseh+Lakeshore+Road+Lake+St+Clair+Ontario",

            detail: "Hamilton Harbour's north shore breakwall and the rip-rap at Bayfront Park hold drum throughout the open-water season. Fish early morning before boat traffic, targeting the outer face of the breakwall where current exchange with Burlington Bay occurs. Drum work the zebra mussel-encrusted concrete alongside carp and white bass. A slip sinker rig with nightcrawler or a 1/4oz jig tipped with Gulp! crawdad works from the park's easily accessible paved bank.",
            map: "https://www.google.com/maps/search/?api=1&query=Bayfront+Park+Hamilton+Harbour+Ontario",

            map: "https://www.google.com/maps/search/?api=1&query=Confederation+Basin+Kingston+Ontario+fishing",

          { title: "Lake Ontario – Bronte Harbour & Port Credit (40 min from Toronto)",

            map: "https://www.google.com/maps/search/?api=1&query=Bronte+Harbour+Oakville+Ontario+fishing",

          { title: "Bay of Quinte – Belleville & Deseronto (2.5 hrs from Toronto)",

            map: "https://www.google.com/maps/search/?api=1&query=Zwicks+Centennial+Park+Belleville+Ontario",
            imgs: ["bay of quinte belleville ontario fishing","quinte narrows shoreline fishing ontario","belleville ontario waterfront park fishing rod"] },
          { title: "Long Point Bay – Lake Erie (2 hrs from Toronto)",
            detail: "<strong>Long Point Provincial Park</strong> and the inner bay shoreline are productive drum zones, especially in the shallower back bay where rocky substrate meets weed edges. The causeway and the Old Cut area at the inner bay provide shore fishing access. The outer Lake Erie side of Long Point gets drum from late May through October. A slip sinker rig with crayfish or nightcrawler is the standard setup. Drum up to 8 lbs are common; 10+ lb fish are caught each season.",
            map: "https://www.google.com/maps/search/?api=1&query=Long+Point+Provincial+Park+Ontario+fishing",
            imgs: ["long point bay lake erie fishing ontario","long point provincial park shore fishing","inner bay fishing ontario sheltered lake"] },
        ]
      },
      {
        id: "technique", icon: "⚙️", label: "Technique", color: "#2a5a3a",
        intro: "Drum are accessible fish but consistent anglers understand a few key execution details that separate the occasional catch from reliable production.",
        videos: [],
        tips: [
          { title: "Detecting bottom takes — watch and feel",
            detail: "Sheephead takes vary from aggressive runs that pull the rod tip to subtle taps and a slow tightening of the line. Watching the rod tip is as important as feeling through the handle — use a sensitive-tip rod in a holder and watch for micro-taps. On a slow take, wait for the line to move steadily before lifting. On a run, lift immediately and sweep the rod firmly to set the hook. Circle hooks eliminate the need to time the strike — just lift and reel.",
            imgs: ["rod tip watching fishing sensitive bottom","angler watching rod tip lake bank","bite indication rod tip movement fishing"] },
          { title: "Casting accuracy — hit the bottom feature",
            detail: "Drum hold tightly to structure — a rocky point, the base of a breakwall, a submerged boulder. Casting 3m away from the feature often produces nothing. Practice casting accuracy so you can consistently land on the structure edge. Use a marker buoy or count the line wraps on the spool to reproduce the same distance cast after cast. Accurate repeat casting into a productive spot is more important for drum than for any other Ontario species.",
            imgs: ["fishing cast accuracy target rod overhead","shore fishing accurate cast dock breakwall","marker buoy fishing distance setup lake"] },
          { title: "Slow retrieve — let the bait breathe",
            detail: "When fishing a jig or Carolina rig, the most common mistake is retrieving too fast. Drum are deliberate bottom feeders — they investigate and then commit. A slow drag along the bottom with a 2–3 second pause every 60cm outperforms a constant retrieve. The pause is when the take most often occurs. Train yourself to wait out the pause rather than immediately continuing the retrieve.",
            imgs: ["slow retrieve bottom fishing rod technique","fisherman patient slow retrieve lake shore","jig bottom pause retrieve fishing technique"] },
          { title: "Playing and landing a drum",
            detail: "A fresh sheephead runs hard and low — they do not jump. Their first run is the strongest; maintain steady pressure and a bent rod. Do not try to horse the fish toward you on the first run. Let it run against a properly set drag, then pump and reel as it tires. Drum of 5+ lbs are capable of multiple strong runs. Net the fish rather than lifting by the lip — a large drum is heavy and the hook can tear under the weight. Wet your hands before handling.",
            imgs: ["angler fighting drum fish bent rod","freshwater drum fish fighting reel","landing net scooping large freshwater fish"] },
          { title: "Feeding the swim — chum to concentrate fish",
            detail: "Pre-baiting your swim with crushed crayfish shells, mashed nightcrawlers, or mussel fragments 10–15 minutes before casting dramatically increases the number of drum that visit your area. The scent trail drifts downstream or along the shore and draws fish in from a wider radius. In harbours and slow-water scenarios, use a mesh bag filled with mashed worms and fish meal on the bottom as a sustained scent dispenser.",
            imgs: ["groundbait chum bag underwater fishing","pre baiting swim fishing free offerings","chum bag mesh sinker bottom fishing lake"] },
          { title: "Catch and release — drum are fragile in warm water",
            detail: "Freshwater drum are excellent catch-and-release fish but are susceptible to stress in warm water (above 22°C). Minimize handling time — keep the fish in the water while removing the hook where possible. Use forceps or a disgorger for deep-hooked fish. If keeping drum for the table (they are excellent eating — firm white flesh similar to walleye), bleed and ice immediately. Return fish with full vertical support in the water until they swim away strongly.",

    ];

    const seasons = [
      { season: "🌸 Spring (May–Jun)",   rating: 4, note: "Excellent — post-ice aggressive feeding" },
      { season: "☀️ Summer (Jul–Aug)",    rating: 3, note: "Good dawn/dusk; fish deeper midday" },
      { season: "🍂 Autumn (Sep–Nov)",    rating: 5, note: "Best season — all-day feeding frenzy" },
      { season: "❄️ Winter (Dec–Apr)",    rating: 1, note: "Very slow; occasional warm spells only" },
    ];
    const baitTemps = [
      { temp: "Below 8°C",  baits: "Nightcrawler, deep slow presentation",  bg: "#e8f0f8" },
      { temp: "8–14°C",     baits: "Crayfish, leech, worm",                  bg: "#e8eef8" },
      { temp: "14–22°C",    baits: "All baits — prime drum temp",            bg: "#e8f5e8" },
      { temp: "Above 22°C", baits: "Cut bait, Gulp! plastic; fish deeper",   bg: "#fdf0e8" },
    ];
    const checklist = [
      "7–7.5ft medium-heavy spinning rod",
      "3000–4000 size spinning reel",
      "14–17lb monofilament or 20lb braid",
      "15lb fluorocarbon leader material",
      "Egg sinkers 1/2–2oz assortment",
      "Bank sinkers 1–3oz (for current)",
      "Three-way swivels + barrel swivels",
      "Wide-gap hooks size 1–2/0",
      "Circle hooks 1/0–2/0",
      "Nightcrawlers (fresh, refrigerated)",
      "Berkley Gulp! crawdads (backup)",
      "1/4–1/2oz jig heads (round and football)",
      "Forceps / disgorger",
      "Landing net (rubber mesh, 45cm+)",
      "Ontario fishing licence",
    ];

    let imgSeed = 100;

    function unsplashUrl(keyword) {
      const seed = imgSeed++;
      return `https://source.unsplash.com/featured/400x300/?${encodeURIComponent(keyword)}&sig=${seed}`;
    }

    function renderExtra(s) {
      if (s.extra === "seasons") {
        return `<div class="extra-panel"><h4>Ontario Season Rating</h4>
          ${seasons.map(r => `
            <div class="season-row">
              <div class="season-name">${r.season}</div>
              <div class="rating-bars">${[1,2,3,4,5].map(n=>`<div class="bar ${n<=r.rating?"on":"off"}"></div>`).join("")}</div>
              <div class="season-note">${r.note}</div>
            </div>`).join("")}
        </div>`;
      }
      if (s.extra === "baittemp") {
        return `<div class="extra-panel"><h4>Quick Bait Temperature Guide</h4>
          <div class="temp-grid">
            ${baitTemps.map(r=>`<div class="temp-card" style="background:${r.bg}"><div class="temp-label">${r.temp}</div><div class="temp-baits">${r.baits}</div></div>`).join("")}
          </div></div>`;
      }
      if (s.extra === "checklist") {
        return `<div class="extra-panel"><h4>Starter Kit Checklist</h4>
          <div class="checklist">${checklist.map(item=>`<div class="check-pill">✓ ${item}</div>`).join("")}</div>
        </div>`;
      }
      return "";
    }

    function buildContent() {
      const content = document.getElementById("content");
      content.innerHTML = sections.map((s, si) => {
        const tipsHTML = s.tips.map((tip, i) => {
          const imgsHTML = (tip.imgs || []).map(kw =>
            `<img class="tip-img" src="${unsplashUrl(kw)}" alt="${kw}" loading="lazy" onerror="this.style.display='none'">`
          ).join("");
          return `
            <div class="tip-card" style="border-left-color:${s.color}; border-color:${s.color}40">
              <div class="tip-body">
                <div class="tip-num" style="color:${s.color}">${String(i+1).padStart(2,"0")}</div>
                <h3 class="tip-title">${tip.title}</h3>
                <p class="tip-detail">${tip.detail}</p>
                ${tip.map ? `<a class="tip-map-link" href="${tip.map}" target="_blank" rel="noopener">📍 View on Google Maps</a>` : ''}
              </div>
              ${imgsHTML ? `<div class="tip-images">${imgsHTML}</div>` : ""}
            </div>`;
        }).join("");

        const videosHTML = s.videos && s.videos.length ? `
          <div class="video-section">
            <div class="video-section-header">▶ &nbsp;Related Video Tutorials — click to watch on YouTube</div>
            <div class="video-grid">
              ${s.videos.map(v => `
                <a class="video-thumb" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
                  <div class="video-label">Tutorial</div>
                  <div class="video-img-wrap">
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.label}" loading="lazy">
                    <div class="play-btn">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
                    </div>
                  </div>
                  <div class="video-title-bar"><span class="yt-badge">YT</span>${v.label}</div>
                </a>`).join("")}
            </div>
          </div>` : "";

        return `
          <section class="fish-section" id="${s.id}">
            <div class="section-header">
              <div class="section-icon" style="background:${s.color}; box-shadow:0 4px 20px ${s.color}55">${s.icon}</div>
              <div>
                <div class="section-title">${s.label}</div>
                <div class="section-intro">${s.intro}</div>
              </div>
            </div>
            <div class="divider" style="background:linear-gradient(90deg,${s.color}88,transparent)"></div>
            <div class="tips">${tipsHTML}</div>
            ${videosHTML}
            ${renderExtra(s)}
          </section>
          ${si < sections.length - 1 ? '<div class="section-break"></div>' : ''}`;
      }).join("");
    }

    function buildNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = sections.map(s =>
        `<a class="nav-btn" href="#${s.id}" data-id="${s.id}">${s.icon} ${s.label}</a>`
      ).join("");

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".nav-btn").forEach(b => {
              b.classList.remove("active");
              b.style.background = "";
            });
            const btn = nav.querySelector(`[data-id="${entry.target.id}"]`);
            if (btn) {
              btn.classList.add("active");
              const sec = sections.find(x => x.id === entry.target.id);
              if (sec) btn.style.background = sec.color;
              btn.scrollIntoView({ block: "nearest", inline: "center" });
            }
          }
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      document.querySelectorAll(".fish-section").forEach(el => observer.observe(el));
    }

    buildContent();
    buildNav();
  </script>
