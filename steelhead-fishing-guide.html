        tips: [

    const seasons = [
      { season: "🌸 Spring Run (Mar–May)", rating: 5, note: "Excellent — large fish, high water" },
      { season: "☀️ Summer (Jun–Aug)",      rating: 1, note: "Virtually no fish — post-spawn return" },
      { season: "🍂 Fall Run (Oct–Nov)",    rating: 5, note: "Best — fresh, bright, aggressive fish" },
      { season: "❄️ Winter (Dec–Feb)",      rating: 2, note: "Slow but possible — Georgian Bay rivers" },
    ];
    const baitTemps = [
      { temp: "Below 4°C",  baits: "Spawn sacs, small jigs (slow drift)", bg: "#e8f0f8" },
      { temp: "4–8°C",      baits: "Spawn sacs, egg beads, nymphs",       bg: "#e8eef8" },
      { temp: "8–12°C",     baits: "All baits — prime steelhead temp",    bg: "#e8f5e8" },
      { temp: "Above 12°C", baits: "Spinners, streamers; fish go deep",   bg: "#fdf0e8" },
    ];
    const checklist = [
      "9–10ft spinning rod or 13–15ft centerpin",
      "Centerpin or spinning reel (2500–4000)",
      "8–10lb monofilament mainline",
      "6–8lb fluorocarbon tippet/leader",
      "Pencil floats (sizes 3–8g)",
      "Split shot assortment (BB, AAA)",
      "Hooks size 6–10 (Gamakatsu, Owner)",
      "Spawn sacs or egg beads",
      "Marabou jigs 1/16–1/8oz (pink, white)",
      "Waders + wading boots",
      "Wading staff",
      "Polarized sunglasses",
      "Rubber-mesh landing net",
      "Forceps / disgorger",
      "Ontario fishing licence",
    ];

    let imgSeed = 100;

    function unsplashUrl(keyword) {
      const seed = imgSeed++;
      return `https://source.unsplash.com/featured/400x300/?${encodeURIComponent(keyword)}&sig=${seed}`;
    }

    function renderExtra(s) {
      if (s.extra === "seasons") {
        return `<div class="extra-panel"><h4>Ontario Season Rating</h4>
          ${seasons.map(r => `
            <div class="season-row">
              <div class="season-name">${r.season}</div>
              <div class="rating-bars">${[1,2,3,4,5].map(n=>`<div class="bar ${n<=r.rating?"on":"off"}"></div>`).join("")}</div>
              <div class="season-note">${r.note}</div>
            </div>`).join("")}
        </div>`;
      }
      if (s.extra === "baittemp") {
        return `<div class="extra-panel"><h4>Quick Bait Temperature Guide</h4>
          <div class="temp-grid">
            ${baitTemps.map(r=>`<div class="temp-card" style="background:${r.bg}"><div class="temp-label">${r.temp}</div><div class="temp-baits">${r.baits}</div></div>`).join("")}
          </div></div>`;
      }
      if (s.extra === "checklist") {
        return `<div class="extra-panel"><h4>Starter Kit Checklist</h4>
          <div class="checklist">${checklist.map(item=>`<div class="check-pill">✓ ${item}</div>`).join("")}</div>
        </div>`;
      }
      return "";
    }

    function buildContent() {
      const content = document.getElementById("content");
      content.innerHTML = sections.map((s, si) => {
        const tipsHTML = s.tips.map((tip, i) => {
          const imgsHTML = (tip.imgs || []).map(kw =>
            `<img class="tip-img" src="${unsplashUrl(kw)}" alt="${kw}" loading="lazy" onerror="this.style.display='none'">`
          ).join("");
          return `
            <div class="tip-card" style="border-left-color:${s.color}; border-color:${s.color}40">
              <div class="tip-body">
                <div class="tip-num" style="color:${s.color}">${String(i+1).padStart(2,"0")}</div>
                <h3 class="tip-title">${tip.title}</h3>
                <p class="tip-detail">${tip.detail}</p>
                ${tip.map ? `<a class="tip-map-link" href="${tip.map}" target="_blank" rel="noopener">📍 View on Google Maps</a>` : ''}
              </div>
              ${imgsHTML ? `<div class="tip-images">${imgsHTML}</div>` : ""}
            </div>`;
        }).join("");

        const videosHTML = s.videos && s.videos.length ? `
          <div class="video-section">
            <div class="video-section-header">▶ &nbsp;Related Video Tutorials — click to watch on YouTube</div>
            <div class="video-grid">
              ${s.videos.map(v => `
                <a class="video-thumb" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
                  <div class="video-label">Tutorial</div>
                  <div class="video-img-wrap">
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.label}" loading="lazy">
                    <div class="play-btn">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
                    </div>
                  </div>
                  <div class="video-title-bar"><span class="yt-badge">YT</span>${v.label}</div>
                </a>`).join("")}
            </div>
          </div>` : "";

        return `
          <section class="fish-section" id="${s.id}">
            <div class="section-header">
              <div class="section-icon" style="background:${s.color}; box-shadow:0 4px 20px ${s.color}55">${s.icon}</div>
              <div>
                <div class="section-title">${s.label}</div>
                <div class="section-intro">${s.intro}</div>
              </div>
            </div>
            <div class="divider" style="background:linear-gradient(90deg,${s.color}88,transparent)"></div>
            <div class="tips">${tipsHTML}</div>
            ${videosHTML}
            ${renderExtra(s)}
          </section>
          ${si < sections.length - 1 ? '<div class="section-break"></div>' : ''}`;
      }).join("");
    }

    function buildNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = sections.map(s =>
        `<a class="nav-btn" href="#${s.id}" data-id="${s.id}">${s.icon} ${s.label}</a>`
      ).join("");

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".nav-btn").forEach(b => {
              b.classList.remove("active");
              b.style.background = "";
            });
            const btn = nav.querySelector(`[data-id="${entry.target.id}"]`);
            if (btn) {
              btn.classList.add("active");
              const sec = sections.find(x => x.id === entry.target.id);
              if (sec) btn.style.background = sec.color;
              btn.scrollIntoView({ block: "nearest", inline: "center" });
            }
          }
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      document.querySelectorAll(".fish-section").forEach(el => observer.observe(el));
    }

    buildContent();
    buildNav();
  </script>
